{% extends 'base.html' %}
{% load static %}

{% block content %}
<div id="page_container">

    {% block header %}
    <div id="header">
        <div id="header_right_logo">
            <img src="{% static 'images/vk-logo.png' %}" alt="وزارت کشور">
        </div>

        <div id="header_title">
            عنوان سامانه
        </div>

        <div id="header_date">
        </div>

        <div id="header_left_logo">
            <img src="{% static 'images/vk-sc-logo.png' %}" alt="مرکز مطالعات">
        </div>
    </div>
    {% endblock header %}

    {% block sidebar %}
    {% include 'sidebar.html' %}
    {% endblock sidebar %}

    {% block main_body %}
    {% endblock main_body %}
<script>
    $(document).ready(function(){
        week = new Array("يكشنبه", "دوشنبه", "سه شنبه", "چهارشنبه", "پنج شنبه", "جمعه", "شنبه")
        months = new Array("فروردين", "ارديبهشت", "خرداد", "تير", "مرداد", "شهريور", "مهر", "آبان", "آذر", "دي", "بهمن", "اسفند");
        a = new Date();
        d = a.getDay();
        day = a.getDate();
        month = a.getMonth() + 1;
        year = a.getYear();
        year = (year == 0) ? 2000 : year;
        (year < 1000) ? (year += 1900) : true;
        year -= ((month < 3) || ((month == 3) && (day < 21))) ? 622 : 621;
        switch (month) {
            case 1:
                (day < 21) ? (month = 10, day += 10) : (month = 11, day -= 20);
                break;
            case 2:
                (day < 20) ? (month = 11, day += 11) : (month = 12, day -= 19);
                break;
            case 3:
                (day < 21) ? (month = 12, day += 9) : (month = 1, day -= 20);
                break;
            case 4:
                (day < 21) ? (month = 1, day += 11) : (month = 2, day -= 20);
                break;
            case 5:
            case 6:
                (day < 22) ? (month -= 3, day += 10) : (month -= 2, day -= 21);
                break;
            case 7:
            case 8:
            case 9:
                (day < 23) ? (month -= 3, day += 9) : (month -= 2, day -= 22);
                break;
            case 10:
                (day < 23) ? (month = 7, day += 8) : (month = 8, day -= 22);
                break;
            case 11:
            case 12:
                (day < 22) ? (month -= 3, day += 9) : (month -= 2, day -= 21);
                break;
            default:
                break;
        }
        document.getElementById("header_date").textContent = " " + week[d] + " " + [day] + " " + months[month - 1] + " " + year
    
    });
</script>
</div>
{% endblock content %}
